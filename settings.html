<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — BonsaiOS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B0F0D">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-shell" id="app-shell"></div>

<template id="tpl-content">
  <div class="grid grid-cols-2" style="align-items:start;">
    <div class="card">
      <h3>Tree profile</h3>
      <div class="field"><label>Name</label><input type="text" id="s-name"></div>
      <div class="field"><label>Species</label><input type="text" id="s-species"></div>
      <div class="field"><label>Acquired date</label><input type="date" id="s-acquired"></div>
      <hr class="divider">
      <h3>Location (for NOAA weather)</h3>
      <div class="field"><label>Display name</label><input type="text" id="s-loc-name"></div>
      <div class="field-row">
        <div class="field"><label>Latitude</label><input type="number" step="0.0001" id="s-lat"></div>
        <div class="field"><label>Longitude</label><input type="number" step="0.0001" id="s-lon"></div>
      </div>
      <button class="btn btn-ghost" id="use-my-location" type="button">Use my current location</button>

      <hr class="divider">
      <h3>Reminder cadence</h3>
      <div class="field-row">
        <div class="field"><label>Watering (days)</label><input type="number" id="s-water-days"></div>
        <div class="field"><label>Fertilizer (days)</label><input type="number" id="s-fert-days"></div>
        <div class="field"><label>Repot check (months)</label><input type="number" id="s-repot-months"></div>
      </div>
    </div>

    <div class="card">
      <h3>GitHub (source of truth)</h3>
      <p style="font-size:12px;">Create a fine-grained Personal Access Token scoped to this repo only, with <b>Contents: Read & write</b>. It's stored in this browser's localStorage and sent only to <code>api.github.com</code>.</p>
      <div class="field-row">
        <div class="field"><label>Owner</label><input type="text" id="s-gh-owner" placeholder="your-github-username"></div>
        <div class="field"><label>Repo</label><input type="text" id="s-gh-repo" placeholder="your-portfolio-repo"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Branch</label><input type="text" id="s-gh-branch" placeholder="main"></div>
        <div class="field"><label>Entries path</label><input type="text" id="s-gh-path" placeholder="bonsai/entries"></div>
      </div>
      <div class="field"><label>Personal Access Token</label><input type="password" id="s-gh-token" placeholder="github_pat_…"></div>
      <button class="btn btn-ghost" id="test-github" type="button">Test connection</button>
      <span id="gh-test-result" style="margin-left:8px; font-size:12.5px;"></span>

      <hr class="divider">
      <h3>Google Sheets (mirror)</h3>
      <p style="font-size:12px;">Deploy <code>google-apps-script/Code.gs</code> as a web app ("Anyone" access) and paste the URL here.</p>
      <div class="field"><label>Apps Script web app URL</label><input type="url" id="s-sheets-url" placeholder="https://script.google.com/macros/s/…/exec"></div>
      <button class="btn btn-ghost" id="test-sheets" type="button">Test connection</button>
      <span id="sheets-test-result" style="margin-left:8px; font-size:12.5px;"></span>

      <hr class="divider">
      <h3>Optional: OpenWeather (UV index only)</h3>
      <div class="field"><label>API key</label><input type="password" id="s-ow-key" placeholder="optional"></div>
    </div>
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="card-head"><h3>Backup</h3></div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn" id="export-config" type="button">Export settings (.json)</button>
      <label class="btn" style="cursor:pointer;">Import settings<input type="file" id="import-config" accept="application/json" style="display:none;"></label>
    </div>
  </div>

  <div style="margin-top:16px;">
    <button class="btn btn-primary" id="save-settings" type="button">Save settings</button>
  </div>
</template>

<script type="module">
  import { initShell } from './js/core/shell.js';
  import { getConfig, updateConfig, setConfig } from './js/core/config.js';
  import { testConnection } from './js/core/github.js';
  import { testSheetsConnection } from './js/core/sheets.js';
  import { toast } from './js/core/toast.js';

  await initShell('settings');
  document.getElementById('page-content').appendChild(document.getElementById('tpl-content').content.cloneNode(true));

  const cfg = getConfig();
  const $ = (id) => document.getElementById(id);
  $('s-name').value = cfg.treeName;
  $('s-species').value = cfg.species;
  $('s-acquired').value = cfg.acquiredDate;
  $('s-loc-name').value = cfg.location.name;
  $('s-lat').value = cfg.location.lat;
  $('s-lon').value = cfg.location.lon;
  $('s-water-days').value = cfg.reminders.wateringDays;
  $('s-fert-days').value = cfg.reminders.fertilizerDays;
  $('s-repot-months').value = cfg.reminders.repotMonths;
  $('s-gh-owner').value = cfg.github.owner;
  $('s-gh-repo').value = cfg.github.repo;
  $('s-gh-branch').value = cfg.github.branch;
  $('s-gh-path').value = cfg.github.entriesPath;
  $('s-gh-token').value = cfg.github.token;
  $('s-sheets-url').value = cfg.sheets.webAppUrl;
  $('s-ow-key').value = cfg.weather.openWeatherKey;

  $('use-my-location').addEventListener('click', () => {
    if (!navigator.geolocation) return toast('Geolocation not available in this browser', { error: true });
    navigator.geolocation.getCurrentPosition(
      (pos) => { $('s-lat').value = pos.coords.latitude.toFixed(4); $('s-lon').value = pos.coords.longitude.toFixed(4); toast('Location filled in.'); },
      (err) => toast(`Location error: ${err.message}`, { error: true })
    );
  });

  function collect() {
    return {
      treeName: $('s-name').value,
      species: $('s-species').value,
      acquiredDate: $('s-acquired').value,
      location: { name: $('s-loc-name').value, lat: Number($('s-lat').value), lon: Number($('s-lon').value) },
      reminders: { wateringDays: Number($('s-water-days').value), fertilizerDays: Number($('s-fert-days').value), repotMonths: Number($('s-repot-months').value) },
      github: { owner: $('s-gh-owner').value.trim(), repo: $('s-gh-repo').value.trim(), branch: $('s-gh-branch').value.trim() || 'main', entriesPath: $('s-gh-path').value.trim() || 'bonsai/entries', token: $('s-gh-token').value.trim() },
      sheets: { webAppUrl: $('s-sheets-url').value.trim() },
      weather: { openWeatherKey: $('s-ow-key').value.trim() }
    };
  }

  $('save-settings').addEventListener('click', () => {
    updateConfig(collect());
    toast('Settings saved.');
  });

  $('test-github').addEventListener('click', async () => {
    updateConfig(collect());
    const out = $('gh-test-result');
    out.textContent = 'Testing…';
    try {
      const info = await testConnection();
      out.textContent = `✓ Connected to ${info.name} (${info.defaultBranch})`;
      out.style.color = 'var(--good)';
    } catch (e) {
      out.textContent = `✗ ${e.message}`;
      out.style.color = 'var(--danger-solid)';
    }
  });

  $('test-sheets').addEventListener('click', async () => {
    updateConfig(collect());
    const out = $('sheets-test-result');
    out.textContent = 'Testing…';
    try {
      await testSheetsConnection();
      out.textContent = '✓ Apps Script responded';
      out.style.color = 'var(--good)';
    } catch (e) {
      out.textContent = `✗ ${e.message}`;
      out.style.color = 'var(--danger-solid)';
    }
  });

  $('export-config').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(getConfig(), null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bonsaios-settings.json';
    a.click();
  });

  $('import-config').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      setConfig(JSON.parse(text));
      toast('Settings imported — reloading…');
      setTimeout(() => location.reload(), 800);
    } catch (err) {
      toast(`Import failed: ${err.message}`, { error: true });
    }
  });
</script>
</body>
</html>
